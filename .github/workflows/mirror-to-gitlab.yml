name: Mirror to GitLab

on:
  push:
    branches: ['**']
  delete:

jobs:
  mirror:
    name: Mirror to GitLab
    runs-on: ubuntu-latest
    if: github.repository == 'ahliweb/awcms-micro'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to GitLab
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url:
            git@gitlab.com:${{ secrets.GITLAB_USERNAME }}/${{ secrets.GITLAB_REPO_NAME }}.git
          ssh_private_key:
            ${{ secrets.GITLAB_SSH_PRIVATE_KEY }}
