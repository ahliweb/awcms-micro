name: Redis test diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  redis-unit:
    name: Redis readiness unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Redis readiness unit tests
        run: bun test tests/unit/redis-foundation.test.ts
