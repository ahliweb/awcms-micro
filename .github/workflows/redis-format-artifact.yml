name: Redis format artifact

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    name: Format Redis readiness files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format Redis readiness files
        run: |
          bunx prettier --write \
            .changeset/redis-readiness-284.md \
            config/redis.env.example \
            docker-compose.redis.yml \
            docs/adr/0030-optional-redis-readiness-foundation.md \
            docs/awcms-micro/redis-readiness.md \
            docs/awcms-micro/repo-inventory.md \
            package.json \
            scripts/redis-health.ts \
            src/lib/redis/cache.ts \
            src/lib/redis/client.ts \
            src/lib/redis/config.ts \
            tests/unit/redis-foundation.test.ts

      - name: Package formatted files
        run: |
          tar -czf redis-readiness-formatted.tar.gz \
            .changeset/redis-readiness-284.md \
            config/redis.env.example \
            docker-compose.redis.yml \
            docs/adr/0030-optional-redis-readiness-foundation.md \
            docs/awcms-micro/redis-readiness.md \
            docs/awcms-micro/repo-inventory.md \
            package.json \
            scripts/redis-health.ts \
            src/lib/redis/cache.ts \
            src/lib/redis/client.ts \
            src/lib/redis/config.ts \
            tests/unit/redis-foundation.test.ts

      - name: Upload formatted files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: redis-readiness-formatted
          path: redis-readiness-formatted.tar.gz
          if-no-files-found: error
          retention-days: 1
