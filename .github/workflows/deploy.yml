name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: awcmsmicro-dev/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: awcmsmicro-dev

      - name: Build packages
        run: pnpm build
        working-directory: awcmsmicro-dev

      - name: Build Cloudflare Template
        run: pnpm --filter @awcms-micro/template-default-cloudflare build
        working-directory: awcmsmicro-dev

      - name: Deploy to Cloudflare Workers
        run: pnpm --filter @awcms-micro/template-default-cloudflare exec wrangler deploy
        working-directory: awcmsmicro-dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
