name: Automated Backups

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      backup_type:
        description: 'Type of backup to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - database
          - env

jobs:
  backup-database:
    name: Backup Database
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.backup_type == 'all' || github.event.inputs.backup_type == 'database'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Install age
        run: |
          curl -LO https://github.com/FiloSottile/age/releases/download/v1.2.0/age-v1.2.0-linux-amd64.tar.gz
          tar -xzf age-v1.2.0-linux-amd64.tar.gz
          sudo mv age/age age/age-keygen /usr/local/bin/

      - name: Backup D1 database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          # Export D1 database
          wrangler d1 export ${{ secrets.D1_DATABASE_NAME }} --output /tmp/backup.sql --remote

          # Encrypt
          echo "$BACKUP_PASSPHRASE" | age --passphrase --output /tmp/backup.sql.age /tmp/backup.sql

          # Upload to R2
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          wrangler r2 object put ${{ secrets.R2_BUCKET_NAME }}/backups/db/backup-${TIMESTAMP}.sql.age --file /tmp/backup.sql.age

          # Cleanup old backups (keep last 7)
          wrangler r2 object list ${{ secrets.R2_BUCKET_NAME }} --prefix "backups/db/" --format json | \
            jq -r '.objects[].key' | \
            sort | \
            head -n -7 | \
            while read key; do
              wrangler r2 object delete "${{ secrets.R2_BUCKET_NAME }}/$key"
            done

          # Secure cleanup
          shred -u /tmp/backup.sql 2>/dev/null || rm -f /tmp/backup.sql

  backup-verify:
    name: Verify Backups
    runs-on: ubuntu-latest
    needs: [backup-database]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Verify latest backup exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          BACKUPS=$(wrangler r2 object list ${{ secrets.R2_BUCKET_NAME }} --prefix "backups/db/" --format json | jq '.objects | length')
          echo "Total backups in R2: $BACKUPS"

          if [ "$BACKUPS" -eq 0 ]; then
            echo "ERROR: No backups found!"
            exit 1
          fi

          LATEST=$(wrangler r2 object list ${{ secrets.R2_BUCKET_NAME }} --prefix "backups/db/" --format json | jq -r '.objects | sort_by(.uploaded) | last.key')
          echo "Latest backup: $LATEST"

  notify:
    name: Notify Result
    runs-on: ubuntu-latest
    needs: [backup-database, backup-verify]
    if: always()

    steps:
      - name: Check backup status
        run: |
          if [ "${{ needs.backup-database.result }}" = "success" ]; then
            echo "Backup completed successfully"
          else
            echo "Backup failed - check logs"
            exit 1
          fi
