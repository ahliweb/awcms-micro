name: Feature request
description: Usulkan kemampuan baru atau peningkatan pada base AWCMS-Micro.
title: "[feat] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Kemampuan **ERP/POS in-store** (mis. kasir fisik, gudang) di luar scope template ini — itu lineage `awcms`. Fitur **website / toko online** ditambah langsung ke registry base repo ini (ADR-0025 §6, ADR-0034 §2, ADR-0036). Lihat `docs/awcms-micro/README.md` §Reusable vs domain turunan.

        Bila usulan ini adalah **modul baru** (bukan perubahan modul yang sudah ada), baca dulu kebijakan admission modul: `docs/awcms-micro/21_module_admission_governance.md` (kategori, pohon keputusan, kriteria) dan isi `docs/awcms-micro/templates/module-proposal-template.md` sebagai lampiran/komentar issue ini sebelum scaffold dimulai.
  - type: textarea
    id: problem
    attributes:
      label: Masalah / kebutuhan
      description: Masalah apa yang ingin diselesaikan? Untuk siapa?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Usulan solusi
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatif yang dipertimbangkan
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: Apakah ini kemampuan base generik?
      options:
        - "Ya — reusable untuk semua tenant/pemakaian template"
        - "Tidak yakin"
        - "Tidak — spesifik domain (mungkin salah repo)"
    validations:
      required: true
  - type: textarea
    id: docs
    attributes:
      label: Dampak dokumentasi / standar
      description: Doc/ADR/kontrak mana yang perlu berubah bila fitur ini diterima?
    validations:
      required: false
