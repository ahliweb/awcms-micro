# Optional Redis overlay for AWCMS-Micro (Issue #284).
#
# Redis is deliberately absent from the default stack. Enable it explicitly:
#
#   cp config/redis.env.example .env.redis
#   # replace REDIS_PASSWORD with a deployment secret
#   docker compose --env-file .env --env-file .env.redis \
#     -f docker-compose.yml -f docker-compose.redis.yml up --build
#
# For the immutable production topology, replace docker-compose.yml above with
# docker-compose.prod.yml. Redis has no published host port. PostgreSQL remains
# authoritative; this service is only for bounded cache/ephemeral coordination.

services:
  # One-shot generator for the ACL file. Only the SHA-256 password hash is
  # written to the named volume; the plaintext secret stays in process env.
  redis-acl-init:
    image: alpine:3.23.1
    restart: "no"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in deployment secrets}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-awcms-micro}
    command:
      - sh
      - -ec
      - |
        case "$${REDIS_PASSWORD}" in
          *[!A-Za-z0-9_-]*|'')
            echo "REDIS_PASSWORD must be a non-empty URL-safe value using A-Z, a-z, 0-9, _ or -." >&2
            exit 1
            ;;
        esac
        case "$${REDIS_KEY_PREFIX}" in
          *[!A-Za-z0-9._-]*|'')
            echo "REDIS_KEY_PREFIX contains unsupported characters." >&2
            exit 1
            ;;
        esac
        password_hash="$$(printf '%s' "$${REDIS_PASSWORD}" | sha256sum | awk '{print $$1}')"
        umask 022
        {
          printf 'user default off\n'
          printf 'user awcms_app on #%s ~%s:* +ping +@read +@write -@dangerous\n' \
            "$${password_hash}" "$${REDIS_KEY_PREFIX}"
        } > /redis-config/users.acl
        chmod 0644 /redis-config/users.acl
    volumes:
      - awcms-micro-redis-config:/redis-config
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  redis:
    image: redis:8.2.7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --aclfile
      - /redis-config/users.acl
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - "60"
      - "1000"
      - --maxmemory
      - ${REDIS_MAXMEMORY:-256mb}
      - --maxmemory-policy
      - ${REDIS_MAXMEMORY_POLICY:-noeviction}
      - --protected-mode
      - "yes"
    environment:
      # Used only by the container healthcheck. Authentication itself is
      # performed against the SHA-256 hash in users.acl.
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in deployment secrets}
    volumes:
      - awcms-micro-redis-data:/data
      - awcms-micro-redis-config:/redis-config:ro
    depends_on:
      redis-acl-init:
        condition: service_completed_successfully
    # Intentionally no `ports:`: reachable only on the Compose network.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "REDISCLI_AUTH=$${REDIS_PASSWORD} redis-cli --user awcms_app ping | grep -q PONG"
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 384M

  app:
    environment:
      REDIS_ENABLED: "true"
      REDIS_URL: "redis://awcms_app:${REDIS_PASSWORD:?Set REDIS_PASSWORD in deployment secrets}@redis:6379/0"
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-awcms-micro}
      REDIS_CONNECTION_TIMEOUT_MS: ${REDIS_CONNECTION_TIMEOUT_MS:-2000}
      REDIS_COMMAND_TIMEOUT_MS: ${REDIS_COMMAND_TIMEOUT_MS:-1000}
      REDIS_MAX_RETRIES: ${REDIS_MAX_RETRIES:-3}
      REDIS_CACHE_DEFAULT_TTL_SEC: ${REDIS_CACHE_DEFAULT_TTL_SEC:-300}
    # Deliberately no `depends_on: redis`. Cache use is fail-open, so Redis
    # unavailability must not prevent the authoritative PostgreSQL app starting.

volumes:
  awcms-micro-redis-data:
  awcms-micro-redis-config:
