# Supply-chain hardening.
minimumReleaseAge: 1440
# rolldown (vite 8's bundler) exact-pins these to its rc version, so the
# cooldown has no mature alternative to fall back to and the install dies.
# Scoped to the binaries/runtime only -- @rolldown/pluginutils etc. stay
# under the cooldown.
minimumReleaseAgeExclude:
  - "@rolldown/binding-*"
  - "@emnapi/core"
  - "@emnapi/runtime"
  # Astro 7.0.0 and the whole @astrojs/* family (adapters, markdown-satteri,
  # internal helpers, etc.) were published together on 2026-06-22 and are all
  # still inside the 24h cooldown. Exclude them so the upgrade install doesn't
  # stall. TEMPORARY: remove this scope exclusion once the cooldown has elapsed.
  - astro
  - "@astrojs/*"
trustPolicy: no-downgrade
strictDepBuilds: true
dangerouslyAllowAllBuilds: false
blockExoticSubdeps: true
verifyStoreIntegrity: true
strictStorePkgContentCheck: true
verifyDepsBeforeRun: error
allowBuilds:
  "@parcel/watcher": true
  sharp: true
  core-js-pure: false
  better-sqlite3: true
  esbuild: true
  workerd: true
  # Transitive @flue/runtime deps. The reviewer ran end-to-end with these
  # build scripts ignored, so none are needed at runtime.
  "@google/genai": false
  "@mongodb-js/zstd": false
  node-liblzma: false
  protobufjs: false
# Reviewed benign trust downgrades (publish-method changes, not takeovers).
trustPolicyExclude:
  - "vite@6.4.1" # trusted-publisher -> provenance (vitejs CI change)
  - "chokidar@4.0.3" # provenance -> none (Astro-pinned; pnpm's documented case)
  - "semver@6.3.1" # provenance -> none (old pinned util via @babel/core)
  - "@portabletext/toolkit@3.0.3" # provenance -> none (old pinned release)
  - "reselect@5.1.1" # provenance -> none (old pinned util)

overrides:
  fast-uri: 3.1.2
  express-rate-limit: 8.5.2
  qs: 6.15.2
  brace-expansion: 5.0.6
  # blockExoticSubdeps: infra/cache-demo's pkg.pr.new Astro preview pulls
  # this via URL. Remove when that preview pin is gone.
  "@astrojs/telemetry": "3.3.0"
  # 1.3.0 is deprecated (CWE-502); pin the patched line.
  "@ungap/structured-clone": "^1.3.1"
  devalue: ^5.8.1
  defu: ^6.1.7
  h3: ^1.15.11
  ajv: ^8.18.0
  markdown-it: ^14.1.1
  path-to-regexp: ^8.4.2
  postcss: ^8.5.15
  rollup: ^4.59.0
  simple-git: ^3.36.0
  ws: ^8.21.0
  yaml: ^2.9.0
  "@hono/node-server@<1.19.13": 1.19.13
  # Dependabot open alerts 2026-07-02:
  # Hono GHSA-2gcr-mfcq-wcc3/GHSA-3hrh-pfw6-9m5x/GHSA-458j-xx4x-4375/GHSA-69xw-7hcm-h432/GHSA-88fw-hqm2-52qc/GHSA-9vqf-7f2p-gf9v/GHSA-f577-qrjj-4474/GHSA-hm8q-7f3q-5f36/GHSA-j6c9-x7qj-28xf/GHSA-p77w-8qqv-26rm/GHSA-qp7p-654g-cw7p/GHSA-rv63-4mwf-qqc2/GHSA-wgpf-jwqj-8h8p/GHSA-wwfh-h76j-fc44/GHSA-xrhx-7g5j-rcj5:
  # cache leakage, header/cookie injection, body-limit bypass, path traversal, JWT validation, IP restriction bypass, and JSX injection fixes.
  hono: ^4.12.27
  # Undici GHSA-35p6-xmwp-9g52/GHSA-g8m3-5g58-fq7m/GHSA-hm92-r4w5-c3mj/GHSA-p88m-4jfj-68fv/GHSA-pr7r-676h-xcf6/GHSA-vmh5-mc38-953g/GHSA-vxpw-j846-p89q:
  # WebSocket DoS, header injection, queue poisoning, TLS validation, SOCKS proxy, and cache disclosure fixes.
  undici: ^7.28.0
  # Vite GHSA-fx2h-pf6j-xcff/GHSA-v6wh-96g9-6wx3/GHSA-4w7w-66w2-5vf9/GHSA-p9ff-h696-f583/GHSA-v2wj-q39q-566r:
  # dev-server fs deny/path traversal and launch-editor UNC handling fixes.
  vite: ^8.0.16
  # JS-YAML GHSA-h67p-54hq-rp68: quadratic-complexity DoS in merge key handling.
  "js-yaml@<4": 3.15.0
  "js-yaml@>=4 <4.2.0": 4.2.0
  # protobufjs GHSA-f38q-mgvj-vph7: schema-derived names can shadow runtime-significant properties.
  protobufjs: ^7.6.3
  # Lodash GHSA-f23m-r3pf-42rh/GHSA-r5fr-rjxr-66jc/GHSA-xxjr-mmjv-4gpg:
  # prototype pollution and template code-injection fixes for transitive yaml-language-server usage.
  lodash: ^4.18.1
  # ECharts GHSA-fgmj-fm8m-jvvx: XSS fix for chart rendering.
  echarts: ^6.1.0
  # smol-toml GHSA-v3rj-xjv7-4jmq: comment-line DoS fix for TOML parsing.
  smol-toml: ^1.7.0
  # GHSA-gv7w-rqvm-qjhr (HIGH) + GHSA-g7r4-m6w7-qqqr (LOW): esbuild < 0.28.1
  # missing binary integrity check and dev-server arbitrary file read.
  esbuild: ^0.28.1

enablePrePostScripts: true

packages:
