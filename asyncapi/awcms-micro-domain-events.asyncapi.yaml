components:
  securitySchemes:
    syncHmac:
      type: httpApiKey
      in: header
      name: X-AWCMS-Micro-Signature
      description: HMAC signature paired with X-AWCMS-Micro-Node-ID and X-AWCMS-Micro-Timestamp.
  messages:
    DomainEvent:
      name: DomainEvent
      title: AWCMS-Micro domain event envelope
      payload:
        $ref: "#/components/schemas/DomainEventEnvelope"
      headers:
        type: object
        required:
          - X-AWCMS-Micro-Node-ID
          - X-AWCMS-Micro-Timestamp
          - X-AWCMS-Micro-Signature
        properties:
          X-AWCMS-Micro-Node-ID:
            type: string
          X-AWCMS-Micro-Timestamp:
            type: string
            format: date-time
          X-AWCMS-Micro-Signature:
            type: string
  schemas:
    DomainEventEnvelope:
      type: object
      required:
        - event_id
        - event_type
        - occurred_at
        - producer
        - payload
      additionalProperties: false
      properties:
        event_id:
          type: string
          format: uuid
        event_type:
          type: string
          pattern: "^[a-z0-9]+(\\.[a-z0-9_]+)+$"
        occurred_at:
          type: string
          format: date-time
        producer:
          type: object
          required:
            - service
            - module
          additionalProperties: false
          properties:
            service:
              type: string
              const: awcms-micro
            module:
              type: string
        tenant_id:
          type:
            - string
            - "null"
          format: uuid
        correlation_id:
          type:
            - string
            - "null"
        payload:
          type: object
          additionalProperties: true
