# Source fragment for the "Comments" module/tag (Issue #271, epic #261 Wave 2,
# ADR-0032).
#
# Owns the `/api/v1/comments/*` paths and the schemas referenced ONLY by this
# tag's operations. Shared components (securitySchemes/parameters/responses,
# ApiSuccess/ApiError/ApiMeta) live in the root file
# (openapi/awcms-micro-public-api.src.yaml).
#
# NOT independently valid OpenAPI -- $ref targets pointing at shared components
# only resolve after `bun run openapi:bundle` merges this file with the root and
# every sibling module fragment into openapi/awcms-micro-public-api.openapi.yaml.
# Edit this file (or the root for shared components), never the generated bundle.
paths:
  /api/v1/comments:
    get:
      tags:
        - Comments
      summary: List approved comments for a published resource
      description: "PUBLIC, anonymous. Tenant is resolved from the request host (never a session). Returns ONLY approved, non-deleted comments for a PUBLISHED, PUBLIC resource, keyset-paginated. Bodies are pre-escaped safe HTML. NO moderation metadata is ever returned. A missing/disabled/unpublished target returns a neutral empty list."
      operationId: commentsList
      security: []
      parameters:
        - name: resourceType
          in: query
          required: true
          description: Opaque commentable resource type (e.g. `blog_post`).
          schema:
            type: string
            maxLength: 64
        - name: resourceId
          in: query
          required: true
          schema:
            type: string
            maxLength: 200
        - name: locale
          in: query
          required: false
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          description: Opaque keyset cursor (a `created_at` timestamp) from a previous response.
          schema:
            type: string
      responses:
        "200":
          description: Approved comments (possibly empty).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/CommentListResponse"
        "429":
          description: Too many requests from this source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Comments
      summary: Submit a comment on a published resource
      description: "PUBLIC, host-resolved. Anti-abuse-gated (honeypot, submit-timing token, blocked terms, duplicate fingerprint, per-IP rate limit) and policy-gated (a `moderated-*` thread starts the comment pending). `Idempotency-Key` REQUIRED. Anonymous is allowed only per the tenant/thread policy. A rejected or held-for-moderation submission returns the SAME neutral `received` acknowledgement so existence/anti-abuse state is never leaked."
      operationId: commentsSubmit
      security: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentSubmitRequest"
      responses:
        "200":
          description: Acknowledgement (accepted-visible or neutral received; held-for-moderation returns the neutral received form).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentSubmitResponse"
        "400":
          description: Missing Idempotency-Key or malformed body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Idempotency-Key reused with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many comments from this source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/comments/{id}/replies:
    post:
      tags:
        - Comments
      summary: Reply to an existing comment (bounded depth)
      description: "PUBLIC, host-resolved. Same anti-abuse + policy gate as a top-level submission; the parent is `{id}` and depth is capped at the tenant's max depth (hard cap 4). Neutral acknowledgement for every outcome."
      operationId: commentsReply
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentReplyRequest"
      responses:
        "200":
          description: Acknowledgement (neutral or accepted).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentSubmitResponse"
        "429":
          description: Too many comments from this source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/comments/{id}:
    patch:
      tags:
        - Comments
      summary: Edit a comment within its edit window
      description: "PUBLIC, host-resolved, author-bound (registered → session; anonymous → IP hash). Succeeds only within the tenant's edit window; the body is re-normalized and re-escaped. A caller can never edit another author's comment."
      operationId: commentsEdit
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - body
              properties:
                body:
                  type: string
                  maxLength: 4000
      responses:
        "200":
          description: The edited comment's safe HTML.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          bodyHtml:
                            type: string
        "404":
          description: Comment not found or not editable by this caller.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: The edit window has expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/comments/{id}/report:
    post:
      tags:
        - Comments
      summary: Report/flag a comment for moderator review
      description: "PUBLIC, host-resolved. Rate-bounded per IP and dedup-bounded (one open flag per comment + reporter IP + reason). Always returns a neutral acknowledgement — never reveals whether the comment exists."
      operationId: commentsReport
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  enum: [spam, abuse, offensive, other]
                detail:
                  type: string
                  maxLength: 1000
      responses:
        "200":
          description: Neutral acknowledgement.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentAckResponse"
        "429":
          description: Too many reports from this source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/comments/{id}/delete-request:
    post:
      tags:
        - Comments
      summary: Request removal of your own comment
      description: "PUBLIC, host-resolved, author-bound. Within the edit window it soft-deletes immediately (row retained); past the window it files a report for a moderator. Neutral acknowledgement."
      operationId: commentsDeleteRequest
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Neutral acknowledgement.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentAckResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/comments/admin/queue:
    get:
      tags:
        - Comments
      summary: Read the moderation queue
      description: "ABAC-guarded by `comments.moderation.read`. Status-filtered, keyset-paginated. The ONLY surface that exposes moderation metadata (reason codes, masked author email, open-report counts). Tenant-bounded."
      operationId: commentsModerationQueue
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, approved, rejected, spam, deleted]
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: The moderation queue page.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ModerationQueueResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/comments/admin/{id}/moderate:
    post:
      tags:
        - Comments
      summary: Approve, reject, or mark a comment as spam
      description: "ABAC-guarded (`comments.moderation.approve` for approve; `comments.moderation.reject` for reject/spam). Reason code required for reject/spam. `Idempotency-Key` required; audited with the reason code."
      operationId: commentsModerate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModerateRequest"
      responses:
        "200":
          description: The comment's new status.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ModerateResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Comment not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Illegal transition or idempotency conflict.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/comments/admin/{id}/archive:
    post:
      tags:
        - Comments
      summary: Archive an approved comment
      description: "ABAC-guarded by `comments.moderation.archive`. Removes an approved comment from public view, retaining it for history. `Idempotency-Key` required; audited."
      operationId: commentsArchive
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: The comment's new status.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ModerateResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Only an approved comment can be archived, or idempotency conflict.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/comments/admin/{id}/restore:
    post:
      tags:
        - Comments
      summary: Restore a comment to pending review
      description: "ABAC-guarded by `comments.moderation.restore` (high-risk). Moves a rejected/spam/archived comment back to pending. `Idempotency-Key` required; audited."
      operationId: commentsRestore
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: The comment's new status.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ModerateResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Illegal transition or idempotency conflict.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/comments/admin/bulk-moderate:
    post:
      tags:
        - Comments
      summary: Apply one moderation decision to many comments
      description: "ABAC-guarded per action (approve → `comments.moderation.approve`; reject/spam → `comments.moderation.reject`). Tenant-bounded, bounded to 100 ids per call, `Idempotency-Key` required, audited per applied item."
      operationId: commentsBulkModerate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkModerateRequest"
      responses:
        "200":
          description: Which ids were applied vs skipped.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/BulkModerateResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Idempotency conflict.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/comments/admin/settings:
    get:
      tags:
        - Comments
      summary: Read this tenant's comment configuration
      description: "ABAC-guarded by `comments.settings.read`. Returns the per-tenant comment config (policy mode, moderation flags, anti-abuse thresholds, blocked terms). No row yet returns the neutral defaults."
      operationId: commentsSettingsRead
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: This tenant's comment configuration.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CommentSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags:
        - Comments
      summary: Update this tenant's comment configuration
      description: "ABAC-guarded by `comments.settings.update` (changes the public comment surface). `Idempotency-Key` required; audited."
      operationId: commentsSettingsUpdate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentSettings"
      responses:
        "200":
          description: The saved configuration.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CommentSettings"
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Idempotency conflict.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  schemas:
    CommentPublicView:
      type: object
      description: A single public-facing comment. NO moderation metadata.
      properties:
        id:
          type: string
          format: uuid
        parentId:
          type: string
          format: uuid
          nullable: true
        depth:
          type: integer
        bodyHtml:
          type: string
          description: Pre-escaped safe HTML (only fixed <a>/<br> tags this server emits).
        authorDisplayName:
          type: string
          nullable: true
        authorKind:
          type: string
          enum: [anonymous, registered]
        createdAt:
          type: string
          format: date-time
        editedAt:
          type: string
          format: date-time
          nullable: true
    CommentListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CommentPublicView"
        nextCursor:
          type: string
          nullable: true
    CommentSubmitRequest:
      type: object
      required:
        - resourceType
        - resourceId
        - body
      properties:
        resourceType:
          type: string
          maxLength: 64
        resourceId:
          type: string
          maxLength: 200
        locale:
          type: string
        body:
          type: string
          maxLength: 4000
        parentId:
          type: string
          format: uuid
          nullable: true
        authorDisplayName:
          type: string
          maxLength: 120
          nullable: true
        authorEmail:
          type: string
          format: email
          nullable: true
          description: Optional. Normalized, hashed, and masked server-side; never stored raw.
        subscribeToReplies:
          type: boolean
          description: Opt-in reply notification (double-opt-in; recipient stored minimized/encrypted).
        timingToken:
          type: string
          description: The signed submit-timing token embedded in the form at render time.
        website:
          type: string
          description: Honeypot field — must be empty (a hidden field a human never fills).
    CommentReplyRequest:
      allOf:
        - $ref: "#/components/schemas/CommentSubmitRequest"
        - type: object
          description: A reply reuses the submit body; resourceType/resourceId are derived from the parent.
    CommentSubmitResponse:
      type: object
      description: "Acknowledgement. A neutral `received` (no `commentId`) is returned for rejected/held-for-moderation/unresolved cases so an accepted-but-pending submission is indistinguishable from a blocked one (no anti-abuse/existence oracle). `publiclyVisible: true`, `status: approved`, and `commentId` are returned ONLY when the comment is immediately publicly visible."
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            status:
              type: string
              enum: [received, approved]
            publiclyVisible:
              type: boolean
            commentId:
              type: string
              format: uuid
    CommentAckResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            status:
              type: string
              enum: [received]
            softDeleted:
              type: boolean
    CommentSettings:
      type: object
      properties:
        defaultPolicyMode:
          type: string
          enum:
            [
              disabled,
              authenticated-only,
              moderated-anonymous,
              moderated-registered
            ]
        requireModeration:
          type: boolean
        allowAnonymous:
          type: boolean
        editWindowSeconds:
          type: integer
          minimum: 0
          maximum: 86400
        maxDepth:
          type: integer
          minimum: 0
          maximum: 8
        maxLength:
          type: integer
          minimum: 100
          maximum: 4000
        maxLinksPerComment:
          type: integer
          minimum: 0
          maximum: 20
        minSubmitSeconds:
          type: integer
          minimum: 0
          maximum: 600
        rateLimitPerHour:
          type: integer
          minimum: 1
          maximum: 1000
        blockedTerms:
          type: array
          items:
            type: string
            maxLength: 100
          maxItems: 200
        turnstileEnabled:
          type: boolean
        notifyOnReply:
          type: boolean
    ModerationQueueItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        threadId:
          type: string
          format: uuid
        resourceType:
          type: string
        resourceUrl:
          type: string
        parentId:
          type: string
          format: uuid
          nullable: true
        depth:
          type: integer
        bodyText:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected, spam, deleted]
        authorKind:
          type: string
        authorDisplayName:
          type: string
          nullable: true
        authorEmailMasked:
          type: string
          nullable: true
          description: Masked email (e.g. `j***@e***`) — never the raw address.
        moderationReasonCode:
          type: string
          nullable: true
        reportCount:
          type: integer
        createdAt:
          type: string
          format: date-time
    ModerationQueueResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ModerationQueueItem"
        nextCursor:
          type: string
          nullable: true
    ModerateRequest:
      type: object
      required:
        - decision
      properties:
        decision:
          type: string
          enum: [approve, reject, spam]
        reasonCode:
          type: string
          maxLength: 64
          description: Required for reject/spam.
        note:
          type: string
          maxLength: 2000
    ModerateResult:
      type: object
      properties:
        commentId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, approved, rejected, spam, deleted]
    BulkModerateRequest:
      type: object
      required:
        - decision
        - commentIds
      properties:
        decision:
          type: string
          enum: [approve, reject, spam]
        commentIds:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
          maxItems: 100
        reasonCode:
          type: string
          maxLength: 64
    BulkModerateResult:
      type: object
      properties:
        applied:
          type: array
          items:
            type: string
            format: uuid
        appliedCount:
          type: integer
        skipped:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              reason:
                type: string
                enum: [not_found, illegal_transition]
