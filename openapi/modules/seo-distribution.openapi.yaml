# Source fragment for the "SEO & Distribution" module/tag (Issue #266, epic
# #261 Wave 1, ADR-0028).
#
# Owns the `/api/v1/seo/config` paths and the schemas referenced ONLY by this
# tag's operations. Shared components (securitySchemes/parameters/responses,
# ApiSuccess/ApiError/ApiMeta) live in the root file
# (openapi/awcms-micro-public-api.src.yaml).
#
# NOT independently valid OpenAPI -- $ref targets pointing at shared components
# only resolve after `bun run openapi:bundle` merges this file with the root and
# every sibling module fragment into openapi/awcms-micro-public-api.openapi.yaml.
# Edit this file (or the root for shared components), never the generated bundle.
paths:
  /api/v1/seo/config:
    get:
      tags:
        - SEO & Distribution
      summary: Read this tenant's SEO defaults
      description: "Returns the per-tenant SEO defaults (site identity, default social image, Twitter/X handle, Organization identity, tenant-wide `noindex` switch). A tenant with no configuration yet returns the neutral defaults (every field null, `defaultRobotsNoindex` false). Gated by `seo_distribution.config.read`."
      operationId: seoConfigRead
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: This tenant's SEO defaults.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SeoTenantSettings"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags:
        - SEO & Distribution
      summary: Update this tenant's SEO defaults
      description: "Full replace of the tenant's SEO defaults. High-risk (rewrites the public metadata/indexability surface, including the tenant-wide `noindex` switch), so it requires an `Idempotency-Key` header and records an audit event. Gated by `seo_distribution.config.update`. Media ids (`defaultSocialMediaId`, `organizationLogoMediaId`) are validated as UUIDs here and resolved same-tenant/verified through `media_library` at render time — an id that does not resolve is simply not emitted."
      operationId: seoConfigUpdate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeoTenantSettingsUpdateRequest"
      responses:
        "200":
          description: SEO defaults updated (or an idempotent replay of an identical prior request).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SeoTenantSettings"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: "The `Idempotency-Key` was already used with a different request payload."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/seo/redirects:
    get:
      tags:
        - SEO & Distribution
      summary: List/search/filter redirect rules
      description: "Tenant-scoped exact-path redirect rules, keyset-paginated newest first (limit 100). Filter by `state`, `targetType`, or a source-path substring `q`. Gated by `seo_distribution.redirect.read`."
      operationId: seoRedirectsList
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque keyset cursor from a previous page.
        - name: state
          in: query
          required: false
          schema:
            type: string
            enum: [active, inactive, archived]
        - name: targetType
          in: query
          required: false
          schema:
            type: string
            enum: [relative_same_tenant, verified_external]
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Substring match on the normalized source path.
      responses:
        "200":
          description: This tenant's redirect rules.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: object
                        required: [redirects, nextCursor]
                        properties:
                          redirects:
                            type: array
                            items:
                              $ref: "#/components/schemas/SeoRedirect"
                          nextCursor:
                            type: string
                            nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - SEO & Distribution
      summary: Create a redirect rule
      description: "Create a tenant-scoped exact-path redirect. High-risk: requires an `Idempotency-Key`, audited. The target is validated through the frozen open-redirect guard and the rule is rejected if it conflicts with an existing source/scope, self-redirects, or would create a loop / over-long chain. Gated by `seo_distribution.redirect.create`."
      operationId: seoRedirectsCreate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeoRedirectCreateRequest"
      responses:
        "200":
          description: Redirect rule created (or an idempotent replay).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/SeoRedirect"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: "Source/scope conflict, redirect loop, over-long chain, or idempotency-key reuse with a different payload."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/seo/redirects/validate:
    post:
      tags:
        - SEO & Distribution
      summary: Validate a redirect rule (dry run) + preview its chain
      description: "Read-only: normalize + validate a proposed rule (frozen open-redirect guard), preview the redirect chain it would produce, and explain any conflict/loop/over-long chain — writing nothing. Gated by `seo_distribution.redirect.read`."
      operationId: seoRedirectsValidate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeoRedirectCreateRequest"
      responses:
        "200":
          description: The validation + chain-preview result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/seo/redirects/import:
    post:
      tags:
        - SEO & Distribution
      summary: Bulk-import redirect rules (with dry run)
      description: "Validate + safety-check up to 200 rules. `dryRun: true` returns a per-item report writing nothing; a real import is all-or-nothing (idempotency-keyed, audited). Gated by `seo_distribution.redirect.create`."
      operationId: seoRedirectsImport
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [redirects]
              properties:
                dryRun:
                  type: boolean
                  default: false
                redirects:
                  type: array
                  maxItems: 200
                  items:
                    $ref: "#/components/schemas/SeoRedirectCreateRequest"
      responses:
        "200":
          description: The import report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: "Idempotency-key reuse with a different payload."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/seo/redirects/capture-url-change:
    post:
      tags:
        - SEO & Distribution
      summary: Capture a URL change into a redirect proposal/rule
      description: "Turn an old→new public path change into an audited redirect PROPOSAL (inactive) or active rule per the tenant's `url_change_auto_policy` (overridable). Idempotency-keyed. Gated by `seo_distribution.redirect.create`."
      operationId: seoRedirectsCaptureUrlChange
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPath, newPath, changeType]
              properties:
                oldPath:
                  type: string
                newPath:
                  type: string
                changeType:
                  type: string
                  enum: [slug_change, domain_change, locale_change]
                policy:
                  type: string
                  enum: [skip, propose, create]
                localeScope:
                  type: string
                  nullable: true
                domainScopeHost:
                  type: string
                  nullable: true
                reason:
                  type: string
                  nullable: true
      responses:
        "200":
          description: The capture outcome (skipped/proposed/created).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: "Conflict/loop/chain rejection, or idempotency-key reuse with a different payload."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/seo/redirects/settings:
    get:
      tags:
        - SEO & Distribution
      summary: Read this tenant's redirect governance policy
      description: "The legacy `/blog/{tenantCode}` → `/news` auto-redirect toggle and the default URL-change auto-capture policy. Gated by `seo_distribution.redirect.read`."
      operationId: seoRedirectSettingsRead
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: This tenant's redirect policy.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/SeoRedirectSettings"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags:
        - SEO & Distribution
      summary: Update this tenant's redirect governance policy
      description: "High-risk (the legacy-blog toggle changes public routing): requires an `Idempotency-Key`, audited. Gated by `seo_distribution.redirect.update`."
      operationId: seoRedirectSettingsUpdate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeoRedirectSettings"
      responses:
        "200":
          description: Redirect policy updated (or an idempotent replay).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/SeoRedirectSettings"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: "Idempotency-key reuse with a different payload."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/seo/redirects/{id}:
    get:
      tags:
        - SEO & Distribution
      summary: Read one redirect rule
      operationId: seoRedirectsGet
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: The redirect rule.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/SeoRedirect"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags:
        - SEO & Distribution
      summary: Update a redirect rule
      description: "Replace the mutable fields (source path is immutable). Re-validates the target through the frozen open-redirect guard + the conflict/loop/chain safety gate. Audited. Gated by `seo_distribution.redirect.update`."
      operationId: seoRedirectsUpdate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeoRedirectUpdateRequest"
      responses:
        "200":
          description: Redirect rule updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/SeoRedirect"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: "Source conflict, redirect loop, or over-long chain."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags:
        - SEO & Distribution
      summary: Soft-delete a redirect rule
      description: "Soft delete (a non-empty `reason` is required). Restore/purge via the lifecycle endpoint. Audited. Gated by `seo_distribution.redirect.delete`."
      operationId: seoRedirectsDelete
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  maxLength: 500
      responses:
        "200":
          description: Redirect rule soft-deleted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/SeoRedirect"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/seo/redirects/{id}/lifecycle:
    post:
      tags:
        - SEO & Distribution
      summary: Transition a redirect rule's state / delete lifecycle
      description: "`activate` | `deactivate` | `archive` | `restore` | `purge`. Idempotency-keyed, audited. `purge` needs `seo_distribution.redirect.delete`; every other action needs `seo_distribution.redirect.update`."
      operationId: seoRedirectsLifecycle
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [activate, deactivate, archive, restore, purge]
      responses:
        "200":
          description: The lifecycle transition result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: "Idempotency-key reuse with a different payload."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/seo/not-found:
    get:
      tags:
        - SEO & Distribution
      summary: List the privacy-minimized 404 governance dashboard
      description: "Top 404 observations by hit count (sanitized path + bare referrer domain only — never full URLs/queries/secrets). `?unresolvedOnly=true` filters to open items. Gated by `seo_distribution.not_found.read`."
      operationId: seoNotFoundList
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: unresolvedOnly
          in: query
          required: false
          schema:
            type: boolean
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: This tenant's 404 observations.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: object
                        required: [observations]
                        properties:
                          observations:
                            type: array
                            items:
                              $ref: "#/components/schemas/SeoNotFoundObservation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/seo/not-found/{id}:
    post:
      tags:
        - SEO & Distribution
      summary: Resolve a 404 observation
      description: "Mark an observation resolved, optionally attaching a same-tenant suggested redirect id. Audited. Gated by `seo_distribution.not_found.update`."
      operationId: seoNotFoundResolve
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                suggestedRedirectId:
                  type: string
                  format: uuid
                  nullable: true
      responses:
        "200":
          description: The resolved observation.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/SeoNotFoundObservation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags:
        - SEO & Distribution
      summary: Dismiss a 404 observation
      description: "Hard-delete an observation the operator does not want to track. Audited. Gated by `seo_distribution.not_found.update`."
      operationId: seoNotFoundDismiss
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: The observation was dismissed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  schemas:
    SeoTenantSettings:
      type: object
      description: "Per-tenant SEO defaults (awcms_micro_seo_tenant_settings). Every string field is nullable; the renderer applies these UNDERNEATH resource-level facts (a resource's own value always wins). The feed/sitemap fields (Issue #267) configure the public discovery surfaces (robots.txt, sitemap index/child, RSS/Atom/JSON feeds)."
      required:
        - siteName
        - defaultMetaDescription
        - defaultSocialMediaId
        - twitterSiteHandle
        - organizationName
        - organizationLogoMediaId
        - defaultRobotsNoindex
        - feedTitle
        - feedDescription
        - feedLogoMediaId
        - feedItemLimit
        - includedResourceTypes
        - sitemapEnabled
        - feedsEnabled
      properties:
        siteName:
          type: string
          nullable: true
          maxLength: 200
          description: "Overrides the tenant display name for og:site_name / JSON-LD WebSite; null falls back to the tenant name."
        defaultMetaDescription:
          type: string
          nullable: true
          maxLength: 500
          description: "Default meta description / og:description when a resource has none."
        defaultSocialMediaId:
          type: string
          format: uuid
          nullable: true
          description: "Default social preview image (media object id, resolved same-tenant/verified at render time)."
        twitterSiteHandle:
          type: string
          nullable: true
          maxLength: 80
          description: 'Rendered as twitter:site, e.g. "@example".'
        organizationName:
          type: string
          nullable: true
          maxLength: 200
          description: "schema.org Organization identity for the site-level JSON-LD node."
        organizationLogoMediaId:
          type: string
          format: uuid
          nullable: true
          description: "Organization logo (media object id, resolved same-tenant/verified at render time)."
        defaultRobotsNoindex:
          type: boolean
          description: "Tenant-wide 'this whole site is noindex' switch (staging/preview). When true, EVERY resource renders robots: noindex, robots.txt disallows all crawling, and every discovery surface degrades to noindex regardless of a resource's own indexability."
        feedTitle:
          type: string
          nullable: true
          maxLength: 200
          description: "Feed channel/title override for RSS/Atom/JSON feeds; null falls back to siteName/tenant name."
        feedDescription:
          type: string
          nullable: true
          maxLength: 500
          description: "Feed channel description; null falls back to a generic default."
        feedLogoMediaId:
          type: string
          format: uuid
          nullable: true
          description: "Feed logo/icon (media object id, resolved same-tenant/verified at render time)."
        feedItemLimit:
          type: integer
          minimum: 1
          maximum: 200
          description: "Max items per feed (RSS/Atom/JSON). Bounded 1..200, default 50 — only ever makes a feed smaller than the hard code ceiling."
        includedResourceTypes:
          type: array
          nullable: true
          maxItems: 50
          items:
            type: string
            maxLength: 64
          description: "Optional allow-list of content-type slugs to include in sitemap/feeds; null (default) means all eligible types. An empty array collapses to null."
        sitemapEnabled:
          type: boolean
          description: "Whether this tenant's sitemap index/child sitemaps are served and advertised in robots.txt."
        feedsEnabled:
          type: boolean
          description: "Whether this tenant's RSS/Atom/JSON feeds are served."
    SeoTenantSettingsUpdateRequest:
      type: object
      description: "Update body — same shape as SeoTenantSettings; omitted string fields are treated as null, an omitted defaultRobotsNoindex defaults to false. Unknown keys are ignored."
      properties:
        siteName:
          type: string
          nullable: true
          maxLength: 200
        defaultMetaDescription:
          type: string
          nullable: true
          maxLength: 500
        defaultSocialMediaId:
          type: string
          format: uuid
          nullable: true
        twitterSiteHandle:
          type: string
          nullable: true
          maxLength: 80
        organizationName:
          type: string
          nullable: true
          maxLength: 200
        organizationLogoMediaId:
          type: string
          format: uuid
          nullable: true
        defaultRobotsNoindex:
          type: boolean
          default: false
        feedTitle:
          type: string
          nullable: true
          maxLength: 200
        feedDescription:
          type: string
          nullable: true
          maxLength: 500
        feedLogoMediaId:
          type: string
          format: uuid
          nullable: true
        feedItemLimit:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
        includedResourceTypes:
          type: array
          nullable: true
          maxItems: 50
          items:
            type: string
            maxLength: 64
        sitemapEnabled:
          type: boolean
          default: true
        feedsEnabled:
          type: boolean
          default: true
    SeoRedirect:
      type: object
      description: "A tenant-scoped exact-path redirect rule (awcms_micro_seo_redirects)."
      required:
        - id
        - sourcePath
        - normalizedSourcePath
        - localeScope
        - domainScopeHost
        - targetType
        - target
        - statusCode
        - state
        - effectiveFrom
        - effectiveUntil
        - preserveQuery
        - reason
        - origin
        - hitCount
        - lastHitAt
        - createdAt
        - updatedAt
        - deletedAt
      properties:
        id:
          type: string
          format: uuid
        sourcePath:
          type: string
          description: The source path as entered (display form).
        normalizedSourcePath:
          type: string
          description: The canonical, match-safe source path (dot-segments resolved, duplicate slashes collapsed, CRLF/traversal/Unicode-confusion rejected).
        localeScope:
          type: string
          nullable: true
          description: Optional locale narrowing; null = all locales.
        domainScopeHost:
          type: string
          nullable: true
          description: Optional server-derived host narrowing (a verified normalized_hostname); null = all of this tenant's hosts.
        targetType:
          type: string
          enum: [relative_same_tenant, verified_external]
        target:
          type: string
          description: The (normalized) redirect target — a relative same-origin path or an absolute URL to one of this tenant's verified hosts. Validated through the frozen open-redirect guard.
        statusCode:
          type: integer
          enum: [301, 302, 307, 308]
        state:
          type: string
          enum: [active, inactive, archived]
        effectiveFrom:
          type: string
          format: date-time
          nullable: true
        effectiveUntil:
          type: string
          format: date-time
          nullable: true
        preserveQuery:
          type: boolean
        reason:
          type: string
          nullable: true
        origin:
          type: string
          enum:
            [
              manual,
              slug_change,
              domain_change,
              locale_change,
              import,
              legacy_blog
            ]
        hitCount:
          type: integer
        lastHitAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true
    SeoRedirectCreateRequest:
      type: object
      required:
        - sourcePath
        - target
      properties:
        sourcePath:
          type: string
          maxLength: 2048
          description: The source path (path-absolute; normalized before matching/uniqueness).
        target:
          type: string
          maxLength: 2048
          description: A relative same-origin path or an absolute URL to one of this tenant's verified hosts. The target TYPE is derived; any unsafe/cross-host/protocol-relative/CRLF target is rejected by the frozen guard.
        localeScope:
          type: string
          nullable: true
        domainScopeHost:
          type: string
          nullable: true
          description: Must be one of this tenant's verified domains, or null.
        statusCode:
          type: integer
          enum: [301, 302, 307, 308]
          default: 301
        state:
          type: string
          enum: [active, inactive, archived]
          default: active
        effectiveFrom:
          type: string
          format: date-time
          nullable: true
        effectiveUntil:
          type: string
          format: date-time
          nullable: true
        preserveQuery:
          type: boolean
          default: false
        reason:
          type: string
          nullable: true
          maxLength: 500
        origin:
          type: string
          enum:
            [
              manual,
              slug_change,
              domain_change,
              locale_change,
              import,
              legacy_blog
            ]
          default: manual
    SeoRedirectUpdateRequest:
      type: object
      required:
        - target
      description: "Update the mutable fields (source path is immutable — supplied only at create)."
      properties:
        target:
          type: string
          maxLength: 2048
        localeScope:
          type: string
          nullable: true
        domainScopeHost:
          type: string
          nullable: true
        statusCode:
          type: integer
          enum: [301, 302, 307, 308]
          default: 301
        state:
          type: string
          enum: [active, inactive, archived]
          default: active
        effectiveFrom:
          type: string
          format: date-time
          nullable: true
        effectiveUntil:
          type: string
          format: date-time
          nullable: true
        preserveQuery:
          type: boolean
          default: false
        reason:
          type: string
          nullable: true
          maxLength: 500
    SeoRedirectSettings:
      type: object
      description: "Per-tenant redirect governance policy (awcms_micro_seo_redirect_settings)."
      required:
        - legacyBlogRedirectEnabled
        - urlChangeAutoPolicy
      properties:
        legacyBlogRedirectEnabled:
          type: boolean
          default: false
          description: "When true (and the tenant has a verified primary host), /blog/{tenantCode}... 301-redirects to the canonical /news... equivalent (ADR-0010 deferral). Default false = today's behavior unchanged."
        urlChangeAutoPolicy:
          type: string
          enum: [skip, propose, create]
          default: propose
          description: "Default action when a URL change is captured. 'propose' (default) creates an INACTIVE rule for operator review; 'create' activates immediately; 'skip' does nothing."
    SeoNotFoundObservation:
      type: object
      description: "A privacy-minimized aggregate 404 observation (sanitized path + bare referrer domain only)."
      required:
        - id
        - normalizedPath
        - referrerDomain
        - locale
        - domainHost
        - hitCount
        - firstSeenAt
        - lastSeenAt
        - suggestedRedirectId
        - resolvedAt
      properties:
        id:
          type: string
          format: uuid
        normalizedPath:
          type: string
          description: Sanitized, normalized request path (query dropped).
        referrerDomain:
          type: string
          nullable: true
          description: Bare referrer hostname only (never the full referrer URL).
        locale:
          type: string
          nullable: true
        domainHost:
          type: string
          nullable: true
        hitCount:
          type: integer
        firstSeenAt:
          type: string
          format: date-time
        lastSeenAt:
          type: string
          format: date-time
        suggestedRedirectId:
          type: string
          format: uuid
          nullable: true
        resolvedAt:
          type: string
          format: date-time
          nullable: true
