# Source fragment for the "News Media" module/tag (Issue #695, epic #679).
#
# Owns every path tagged "News Media" and every schema referenced ONLY by this
# tag's operations. Schemas shared with another module/tag live in the root
# file (openapi/awcms-micro-public-api.src.yaml) instead.
#
# NOT independently valid OpenAPI -- $ref targets pointing at shared
# components (securitySchemes/parameters/responses, and cross-module
# schemas) only resolve after `bun run openapi:bundle` merges this file with
# the root file and every sibling module file into
# openapi/awcms-micro-public-api.openapi.yaml. Edit this file (or the root
# file for shared components), never the generated bundle.
paths:
  /api/v1/media/enforcement:
    get:
      tags:
        - News Media
      summary: Read whether managed-media enforcement is active for this tenant
      description: |
        Reports whether this tenant's content media references must resolve to verified registry objects, and — when enforcement cannot be enabled — the deployment-config reasons why (ADR-0026 step 5a).

        `reasons` name environment variables, never their values, so nothing secret is exposed; the endpoint is still permission-gated (`media_library.enforcement.read`) rather than public.
      operationId: mediaEnforcementRead
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Current enforcement state for this tenant plus this deployment's media readiness.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/MediaEnforcementState"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - News Media
      summary: Turn managed-media enforcement ON for this tenant (one-way)
      description: |
        Enables managed-media enforcement: from then on, content media references must resolve to verified, same-tenant registry objects rather than raw URLs (ADR-0026 step 5a). This is the switch a brochure-site tenant (`blog_content` + `tenant_domain`, no news portal) previously did not have — enforcement used to be reachable only through `news_portal`'s R2-only preset.

        **This operation is one-way and there is deliberately no counterpart that disables enforcement.** A tenant able to switch its own media validation off is a confirmed exploit this design exists to prevent (see migration `sql/043`'s header); the "off" transition therefore does not exist anywhere in the codebase. A deployment that must roll back does so by changing its `NEWS_MEDIA_R2_*` configuration — an operator act outside the tenant's reach.

        Idempotent: re-enabling an already-enforcing tenant succeeds, refreshes the timestamp, and returns `alreadyEnforced: true`. No `Idempotency-Key` is required.
      operationId: mediaEnforcementEnable
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Enforcement is active for this tenant.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/MediaEnforcementEnabled"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: |
            The deployment's media storage is not ready, so enforcement cannot be enabled — `error.details.reasons` says which check failed. A 409 rather than a 400 on purpose: the request is well-formed and the caller is authorized; it is the deployment, not the request body, that must change.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/media/news-images/upload-sessions:
    post:
      tags:
        - News Media
      summary: Create a direct-to-R2 presigned upload session for a news image
      operationId: newsMediaUploadSessionsCreate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNewsMediaUploadSessionRequest"
      responses:
        "200":
          description: Upload session created — a `pending_upload` metadata row plus a short-lived presigned PUT URL scoped to exactly one server-generated object key. Never includes raw R2 credentials.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/NewsMediaUploadSessionCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          description: News media R2 storage is not configured/enabled for this deployment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/media/news-images/upload-sessions/{id}/cancel:
    post:
      tags:
        - News Media
      summary: Cancel a still-pending-upload session
      operationId: newsMediaUploadSessionsCancel
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Upload session cancelled (status `failed`).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/NewsMediaObjectItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Upload session is not `pending_upload` (already uploaded/verified/attached/failed).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/media/news-images/upload-sessions/{id}/finalize:
    post:
      tags:
        - News Media
      summary: Finalize an upload session — real R2 GET + magic-byte MIME sniffing + server-side SHA-256 checksum (never a bare HEAD)
      description: "Verifies the object actually uploaded to R2 by performing a HEAD (existence + real size) followed by a FULL GET, sniffing the MIME type from the object's actual magic bytes, and computing a SHA-256 checksum server-side from the bytes read. A client-claimed `checksumSha256` (if supplied) is compared only as a transport- corruption check — it is never a substitute for the MIME sniff. This closes the security-auditor Critical finding on Issue #631: `HEAD` alone can never promote a media object to `verified`."
      operationId: newsMediaUploadSessionsFinalize
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinalizeNewsMediaUploadSessionRequest"
      responses:
        "200":
          description: Object verified — media object status is now `verified`.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/NewsMediaObjectItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Upload session is not `pending_upload`, has expired (`UPLOAD_SESSION_EXPIRED`), or the Idempotency-Key was reused with a different request (`IDEMPOTENCY_CONFLICT`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "422":
          description: Uploaded object failed content verification (`UPLOAD_VERIFICATION_FAILED`) — MIME sniff did not match the allow-list/claimed mime type, checksum mismatch, size exceeded, or the object does not exist in R2. `error.details.reason` is one of `object_not_found`, `size_exceeded`, `mime_not_recognized`, `mime_not_allowed`, `mime_mismatch`, `checksum_mismatch`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          description: Unable to verify the uploaded object right now (R2 provider error/circuit breaker open) — retry shortly.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    MediaEnforcementState:
      type: object
      required:
        - enforced
        - ready
        - reasons
        - detail
      additionalProperties: false
      properties:
        enforced:
          type: boolean
          description: Whether this tenant's content media references must resolve to verified registry objects. Once true it stays true — enforcement is one-way by design.
        ready:
          type: boolean
          description: Whether this DEPLOYMENT's media storage is configured well enough for enforcement to be enabled. Independent of `enforced` — both must hold for validation to actually run.
        reasons:
          type: array
          description: Machine-readable readiness failures; empty when `ready` is true.
          items:
            type: string
            enum:
              - news_media_r2_disabled
              - news_media_r2_config_incomplete
              - news_media_r2_shares_sync_storage_bucket_or_credentials
        detail:
          type: array
          description: Human-readable evidence, one entry per failing check. Names environment variables, never their values.
          items:
            type: string
    MediaEnforcementEnabled:
      type: object
      required:
        - enforced
        - enforcedAt
        - alreadyEnforced
      additionalProperties: false
      properties:
        enforced:
          type: boolean
          enum: [true]
          description: "Always true — a non-enforcing outcome is reported as a 409, never as a 200 whose `enforced` is false."
        enforcedAt:
          type: string
          format: date-time
          description: When this activation was confirmed. Refreshed on re-activation so it always reflects the most recent confirmed-ready enable.
        alreadyEnforced:
          type: boolean
          description: True when the tenant was already enforcing before this call — an idempotent no-change, still audited.
    CreateNewsMediaUploadSessionRequest:
      type: object
      required:
        - mimeType
        - byteSize
      additionalProperties: false
      properties:
        mimeType:
          type: string
          description: "Must be one of the deployment's configured NEWS_MEDIA_R2_ALLOWED_MIME_TYPES (default: image/jpeg, image/png, image/webp, image/gif — image/svg+xml is never allowed by default)."
          example: image/jpeg
        byteSize:
          type: integer
          minimum: 1
          description: Claimed size in bytes — shape-only check against NEWS_MEDIA_R2_MAX_UPLOAD_BYTES; the real size is re-checked from R2 itself at finalize time.
        originalFilename:
          type: string
          nullable: true
          description: Stored as display-only metadata — never part of the server-generated object key.
        altText:
          type: string
          nullable: true
        caption:
          type: string
          nullable: true
    FinalizeNewsMediaUploadSessionRequest:
      type: object
      additionalProperties: false
      properties:
        checksumSha256:
          type: string
          nullable: true
          description: Optional. When supplied, compared against the checksum computed server-side from the bytes actually read from R2 — this is a transport-corruption check only, never a substitute for the server-side MIME sniff.
          pattern: ^[0-9a-fA-F]{64}$
          example: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
    NewsMediaObjectItem:
      type: object
      required:
        - id
        - tenantId
        - objectKey
        - publicUrl
        - mimeType
        - status
        - createdAt
        - updatedAt
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        moduleKey:
          type: string
        ownerResourceType:
          type: string
          nullable: true
          enum:
            - blog_post
            - blog_page
            - homepage_section
            - gallery_item
            - ad
            - video_thumbnail
            - seo_image
            - null
        ownerResourceId:
          type: string
          format: uuid
          nullable: true
        storageDriver:
          type: string
          enum:
            - cloudflare_r2
        objectKey:
          type: string
        originalFilename:
          type: string
          nullable: true
        publicUrl:
          type: string
          format: uri
        mimeType:
          type: string
        sizeBytes:
          type: integer
          nullable: true
        checksumSha256:
          type: string
          nullable: true
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
        altText:
          type: string
          nullable: true
        caption:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - pending_upload
            - uploaded
            - verified
            - attached
            - orphaned
            - deleted
            - failed
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    NewsMediaUploadSessionCreated:
      type: object
      required:
        - objectId
        - objectKey
        - presignedUrl
        - expiresAt
      additionalProperties: false
      properties:
        objectId:
          type: string
          format: uuid
        objectKey:
          type: string
          description: Server-generated — news-media/{tenantId}/{yyyy}/{mm}/{uuid}.{ext}. Never derived from client input.
          example: news-media/3fa85f64-5717-4562-b3fc-2c963f66afa6/2026/07/1b9d6bcd-bbfd-4b2d-9b5d-ab8dfbbd4bed.jpg
        presignedUrl:
          type: string
          format: uri
          description: Short-lived presigned PUT URL scoped to exactly one object key. Never includes raw R2 credentials.
        expiresAt:
          type: string
          format: date-time
